name: Documentation

on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:

jobs:
  build:
    permissions:
      contents: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # FactorVSA dev-links MORK + PathMap via [sources] (../MORK, ../PathMap);
      # MORK in turn dev-links ../PathMap. Clone both siblings before instantiation,
      # else Pkg.instantiate() can't resolve the unregistered deps.
      - name: Clone PathMap + MORK (path [sources] dependencies)
        run: |
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/PathMap.git ../PathMap
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/MORK.git ../MORK
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: julia --project=docs -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build and deploy
        env:
          # Deploys to gh-pages via the built-in token (no DOCUMENTER_KEY secret needed,
          # given permissions: contents: write) — matches the sibling repos.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs docs/make.jl
