name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    # Run threaded so the DualIndex concurrency testset is exercised (it skips-with-log
    # under a single thread). GitHub runners have ≥2 cores → `auto` gives ≥2 threads.
    env:
      JULIA_NUM_THREADS: 'auto'
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12']
        os: [ubuntu-latest]
        arch: [x64]
    steps:
      - uses: actions/checkout@v4
      # FactorVSA dev-links MORK + PathMap via [sources] paths (../MORK, ../PathMap);
      # MORK in turn dev-links ../PathMap. Clone both siblings before instantiation,
      # else Pkg can't resolve the unregistered deps.
      - name: Clone PathMap + MORK (path [sources] dependencies)
        run: |
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/PathMap.git ../PathMap
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/MORK.git ../MORK
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  gate:
    name: Step-4 margin gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Clone PathMap + MORK (path [sources] dependencies)
        run: |
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/PathMap.git ../PathMap
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/MORK.git ../MORK
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      # The package's headline property: the resonator/cleanup margin gate must PASS
      # (Lemma 2 / Thm 3 / Thm 2). Seeded, so deterministic. See GATE_RESULT.md.
      - name: Run margin gate and require PASS
        run: |
          out=$(julia --project=. bench/gate.jl)
          echo "$out"
          if ! echo "$out" | grep -q "GATE VERDICT: PASS"; then
            echo "::error::Step-4 margin gate did not PASS"
            exit 1
          fi
          echo "Margin gate PASSED."

  format:
    name: Format (Blue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      # No julia-actions/cache here — a cached Manifest can pin an older
      # JuliaFormatter than the pinned version, causing local/CI drift.
      - name: Check formatting
        run: |
          julia -e 'using Pkg; Pkg.add(PackageSpec(name="JuliaFormatter", version="2.5.2"))'
          julia -e 'using JuliaFormatter; println("JuliaFormatter ", pkgversion(JuliaFormatter))'
          julia -e 'using JuliaFormatter; format(".")'
          if ! git diff --quiet; then
            echo "::error::Formatting check failed — files below are not Blue-formatted:"
            git --no-pager diff --stat
            git --no-pager diff
            exit 1
          fi
          echo "All files Blue-formatted."
